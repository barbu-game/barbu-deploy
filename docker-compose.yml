# Local full stack. Run from this folder with sibling repos checked out next to it:
#   barbu-server/  barbu-web/  barbu-deploy/
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: barbu
      POSTGRES_PASSWORD: barbu
      POSTGRES_DB: barbu
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  server:
    build:
      context: ../barbu-server
      dockerfile: app/Dockerfile
    environment:
      JDBC_URL: jdbc:postgresql://postgres:5432/barbu
      JDBC_DRIVER: org.postgresql.Driver
      JDBC_USER: barbu
      JDBC_PASSWORD: barbu
      JWT_SECRET: change-me-in-production-this-must-be-at-least-256-bits-long-0123456789
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis

  web:
    build:
      context: ../barbu-web
      args:
        NEXT_PUBLIC_WS_URL: ws://localhost:8080/ws/game
    ports:
      - "3000:3000"
    depends_on:
      - server
