apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: barbu-alerts
  labels:
    release: kps
spec:
  groups:
    - name: barbu.rules
      rules:
        - alert: BarbuServerDown
          expr: up{service="barbu-server"} == 0
          for: 2m
          labels: { severity: critical }
          annotations:
            summary: "Barbu server unreachable"
            description: "The barbu-server Prometheus target has been down for 2 min."
        - alert: BarbuServerHigh5xx
          expr: |
            sum(rate(http_server_requests_seconds_count{service="barbu-server",status=~"5.."}[5m]))
            / clamp_min(sum(rate(http_server_requests_seconds_count{service="barbu-server"}[5m])), 0.001) > 0.05
          for: 10m
          labels: { severity: warning }
          annotations:
            summary: "High 5xx rate (Barbu server)"
            description: "More than 5% of 5xx responses over 10 min."
        - alert: WorkerMemoryHigh
          expr: |
            (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) > 0.9
          for: 10m
          labels: { severity: warning }
          annotations:
            summary: "Node memory > 90%"
            description: "The worker has been under memory pressure for 10 min."
        - alert: PostgresNotReady
          expr: cnpg_pg_replication_in_recovery == 1 or absent(cnpg_collector_up{namespace="barbu"})
          for: 5m
          labels: { severity: critical }
          annotations:
            summary: "Barbu Postgres unhealthy"
            description: "The CNPG barbu-postgres cluster does not report a healthy state."
