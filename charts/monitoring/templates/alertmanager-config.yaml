apiVersion: monitoring.coreos.com/v1alpha1
kind: AlertmanagerConfig
metadata:
  name: barbu-discord
  # Must live in the Alertmanager's namespace (the operator resolves a global
  # alertmanagerConfiguration there), not the chart's default barbu destination.
  namespace: {{ .Values.namespace }}
spec:
  route:
    receiver: discord
    groupBy: ["alertname"]
    groupWait: 30s
    groupInterval: 5m
    repeatInterval: 4h
    routes:
      - receiver: "null"
        matchers:
          - name: alertname
            value: Watchdog
            matchType: "="
  receivers:
    - name: "null"
    - name: discord
      discordConfigs:
        - sendResolved: true
          apiURL:
            name: {{ .Values.alertmanager.discordSecret }}
            key: url
