{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  labels:
    app: {{ .Chart.Name }}
spec:
  podSelector: {}
  policyTypes: [Ingress]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-http
  labels:
    app: {{ .Chart.Name }}
spec:
  # Traefik → web and server (front + API/WS).
  podSelector:
    matchExpressions:
      - key: app
        operator: In
        values: ["barbu-web", "barbu-server"]
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.ingressNamespace }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-server-to-datastores
  labels:
    app: {{ .Chart.Name }}
spec:
  # server → redis (6379), postgres (5432) and DNS.
  podSelector:
    matchLabels:
      app: barbu-server
  policyTypes: [Egress]
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: barbu-redis
      ports:
        - port: 6379
    - to:
        - podSelector:
            matchLabels:
              cnpg.io/cluster: barbu-postgres
      ports:
        - port: 5432
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
{{- if .Values.networkPolicy.linkerd }}
    # Default-deny egress also blocks the Linkerd proxy from reaching the control plane, so a meshed
    # server never gets its identity; allow egress to linkerd so the proxy can bootstrap.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: linkerd
{{- end }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-monitoring-scrape
  labels:
    app: {{ .Chart.Name }}
spec:
  # default-deny blocks Prometheus (monitoring ns) from scraping barbu pods: server metrics (8080)
  # and CNPG exporter (9187). Without it targets show down and PostgresNotReady fires on a healthy DB.
  podSelector: {}
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.monitoringNamespace }}
      ports:
        - port: 8080
        - port: 9187
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-redis-ingress
  labels:
    app: {{ .Chart.Name }}
spec:
  # default-deny-ingress also selects the datastores (egress rules don't open ingress). Open Redis
  # 6379 to in-namespace clients so the connection isn't dropped at the Redis ingress.
  podSelector:
    matchLabels:
      app: barbu-redis
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Release.Namespace }}
      ports:
        - port: 6379
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-postgres-ingress
  labels:
    app: {{ .Chart.Name }}
spec:
  # Postgres (CNPG) needs 5432 from in-namespace clients, and all ports from the CNPG operator ns:
  # its instance-status scrape (8000) is otherwise blocked and the Cluster reports NotReady.
  podSelector:
    matchLabels:
      cnpg.io/cluster: barbu-postgres
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Release.Namespace }}
      ports:
        - port: 5432
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.postgresOperatorNamespace }}
{{- if .Values.networkPolicy.linkerd }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-linkerd
  labels:
    app: {{ .Chart.Name }}
spec:
  # Allow proxy ports (4143/4191) from the control plane and meshed peers so default-deny-ingress
  # doesn't break the mesh. Do NOT add an egress clause on podSelector {}: it would clamp every pod's
  # egress to linkerd only, breaking DNS and datastore access for pods with no other egress rule.
  podSelector: {}
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: linkerd
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Release.Namespace }}
      ports:
        - port: 4143
        - port: 4191
{{- end }}
{{- end }}
