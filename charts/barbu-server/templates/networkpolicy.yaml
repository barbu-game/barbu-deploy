{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  labels:
    app: {{ .Chart.Name }}
spec:
  podSelector: {}
  policyTypes: [Ingress]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-http
  labels:
    app: {{ .Chart.Name }}
spec:
  # Traefik → web and server (front + API/WS).
  podSelector:
    matchExpressions:
      - key: app
        operator: In
        values: ["barbu-web", "barbu-server"]
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.ingressNamespace }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-server-to-datastores
  labels:
    app: {{ .Chart.Name }}
spec:
  # server → redis (6379), postgres (5432) and DNS.
  podSelector:
    matchLabels:
      app: barbu-server
  policyTypes: [Egress]
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: barbu-redis
      ports:
        - port: 6379
    - to:
        - podSelector:
            matchLabels:
              cnpg.io/cluster: barbu-postgres
      ports:
        - port: 5432
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-monitoring-scrape
  labels:
    app: {{ .Chart.Name }}
spec:
  # default-deny (podSelector {}) also blocks Prometheus in the monitoring namespace from scraping
  # any barbu pod — server metrics (8080) and the CNPG exporter (9187). Without this the targets
  # show down and PostgresNotReady fires via absent(cnpg_collector_up) even while the DB is healthy.
  podSelector: {}
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.monitoringNamespace }}
      ports:
        - port: 8080
        - port: 9187
{{- if .Values.networkPolicy.linkerd }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-linkerd
  labels:
    app: {{ .Chart.Name }}
spec:
  # default-deny must not break the mesh: allow the Linkerd proxy ports from the control plane and
  # meshed peers, and egress to the control plane (identity/destination/policy).
  podSelector: {}
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: linkerd
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: barbu
      ports:
        - port: 4143
        - port: 4191
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: linkerd
{{- end }}
{{- end }}
