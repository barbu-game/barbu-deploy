apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Chart.Name }}
  labels:
    app: {{ .Chart.Name }}
spec:
  # Stable pod identities (barbu-server-0..N) so a table's owning pod is addressable by name;
  # no volumeClaimTemplates — durable state lives in Redis + Postgres, not on the pod.
  serviceName: {{ .Chart.Name }}-headless
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Chart.Name }}
  template:
    metadata:
      labels:
        app: {{ .Chart.Name }}
    spec:
      imagePullSecrets:
        - name: {{ .Values.imagePullSecret }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
          env:
            - name: POD_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: REDIS_URI
              value: {{ .Values.config.redisUri | quote }}
            - name: JDBC_URL
              value: {{ .Values.config.jdbcUrl | quote }}
            - name: JDBC_DRIVER
              value: {{ .Values.config.jdbcDriver | quote }}
            - name: CORS_ALLOWED_ORIGINS
              value: {{ .Values.config.corsAllowedOrigins | quote }}
          envFrom:
            - secretRef:
                name: {{ .Values.secretName }}
          # Startup can take ~15s (JVM + Flyway); gate the other probes behind it
          # so a slow boot never trips liveness.
          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 12
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          # A live pod may stall /health briefly under WebSocket write back-pressure;
          # tolerate ~2min of that before a restart instead of the 1s/3-strike default.
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
