apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Chart.Name }}
  labels:
    app: {{ .Chart.Name }}
spec:
  # Stable pod identities (barbu-server-0..N) so a table's owning pod is addressable by name;
  # no volumeClaimTemplates — durable state lives in Redis + Postgres, not on the pod.
  serviceName: {{ .Chart.Name }}-headless
  # Initial value only — KEDA is the authority on replicas; ArgoCD ignores /spec/replicas.
  replicas: {{ .Values.replicaCount }}
  podManagementPolicy: OrderedReady
  updateStrategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: {{ .Chart.Name }}
  template:
    metadata:
      labels:
        app: {{ .Chart.Name }}
      annotations:
        # Redis and Postgres are unmeshed: keep the Linkerd sidecar out of the datastore path so
        # its protocol detection can't break the raw TCP handshakes (Micronaut fails fast on boot
        # otherwise — "Connection closed prematurely").
        config.linkerd.io/skip-outbound-ports: "6379,5432"
    spec:
      imagePullSecrets:
        - name: {{ .Values.imagePullSecret }}
      # Give the drain handler time: preStop lets Traefik see NotReady, then SIGTERM releases leases.
      terminationGracePeriodSeconds: 40
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: {{ .Chart.Name }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
          env:
            - name: POD_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: REDIS_URI
              value: {{ .Values.config.redisUri | quote }}
            - name: JDBC_URL
              value: {{ .Values.config.jdbcUrl | quote }}
            - name: JDBC_DRIVER
              value: {{ .Values.config.jdbcDriver | quote }}
            - name: CORS_ALLOWED_ORIGINS
              value: {{ .Values.config.corsAllowedOrigins | quote }}
          envFrom:
            - secretRef:
                name: {{ .Values.secretName }}
          # Startup can take ~15s (JVM + Flyway); gate the other probes behind it
          # so a slow boot never trips liveness.
          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 12
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          # A live pod may stall /health briefly under WebSocket write back-pressure;
          # tolerate ~2min of that before a restart instead of the 1s/3-strike default.
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          lifecycle:
            preStop:
              exec:
                # Let Traefik observe readiness=NotReady before shutdown (the shutdown handler then
                # releases leases). The Debian JRE image provides /bin/sh.
                command: ["/bin/sh", "-c", "sleep 5"]
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
