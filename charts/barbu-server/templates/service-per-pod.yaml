{{- /*
One Service per StatefulSet ordinal, selecting the pod-name label the controller sets. These are
the routing targets for the per-pod ingress paths (/pod/<pod>), so a client can reach the exact
pod that owns its table. Rendered for podRouting.maxCount (the autoscaling upper bound), not the
current replica count: an ordinal with no pod yet selects nothing, and a pod KEDA adds is already routed.
*/ -}}
{{- range $i := until (int .Values.podRouting.maxCount) }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $.Chart.Name }}-{{ $i }}
  labels:
    app: {{ $.Chart.Name }}
spec:
  type: ClusterIP
  selector:
    statefulset.kubernetes.io/pod-name: {{ $.Chart.Name }}-{{ $i }}
  ports:
    - name: http
      port: {{ $.Values.service.port }}
      targetPort: http
{{- end }}
