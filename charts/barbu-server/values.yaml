# A game room lives in one pod's memory, so v1 runs a single replica and routes
# every player of a table to it via Traefik sticky-cookie sessions.
replicaCount: 1

image:
  repository: ghcr.io/barbu-game/barbu-server
  tag: "0.17.0" # bumped by the release pipeline
  pullPolicy: IfNotPresent

imagePullSecret: ghcr-pull

service:
  type: ClusterIP
  port: 8080
  # Traefik sticky session so all players of a table reach the same pod.
  stickyCookie: "barbu_srv"

ingress:
  enabled: true
  className: traefik
  host: api.barbu.kour0.com
  certResolver: le

config:
  jdbcUrl: jdbc:postgresql://barbu-postgres-rw:5432/barbu
  jdbcDriver: org.postgresql.Driver
  # Origin allowed to call the API from the browser (CORS). Must match the deployed web host.
  corsAllowedOrigins: https://barbu.kour0.com

# A Secret (created out-of-band) must hold JDBC_USER, JDBC_PASSWORD, JWT_SECRET.
secretName: barbu-server-secrets

resources:
  requests:
    cpu: 100m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 768Mi

metrics:
  serviceMonitor:
    enabled: true
    interval: 30s
    path: /prometheus
