# A game room lives in one pod's memory, so v1 runs a single replica and routes
# every player of a table to it. Sharding (room directory in Redis) comes later.
replicaCount: 1

image:
  repository: ghcr.io/REPLACE_ORG/barbu-server
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: true
  className: nginx
  host: api.barbu.example.com
  # WebSocket upgrade + sticky routing for long-lived game connections.
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/affinity: cookie

config:
  jdbcUrl: jdbc:postgresql://barbu-postgres:5432/barbu
  jdbcDriver: org.postgresql.Driver

# A Secret (created out-of-band) must hold JDBC_USER, JDBC_PASSWORD, JWT_SECRET.
secretName: barbu-server-secrets

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 512Mi
