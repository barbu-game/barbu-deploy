# Room state is externalized to Redis (lease + snapshot), so tables survive pod loss and the
# server runs multi-replica. Tables are addressable per-pod via /pod/<pod>; the sticky cookie
# still pins the initial lobby/matchmaking flow.
replicaCount: 3

# Per-pod routing (Services + /pod/<pod> ingress paths) is rendered for maxCount pods — the upper
# bound of KEDA autoscaling — not the current replica count, so a pod KEDA adds is already routable.
podRouting:
  maxCount: 8

image:
  repository: ghcr.io/barbu-game/barbu-server
  tag: "0.1.0" # bumped by the release pipeline
  pullPolicy: IfNotPresent

imagePullSecret: ""

service:
  type: ClusterIP
  port: 8080
  # Traefik sticky session so all players of a table reach the same pod.
  stickyCookie: "barbu_srv"

ingress:
  enabled: true
  className: traefik
  host: api.barbu.kour0.com
  certResolver: le

config:
  redisUri: redis://barbu-redis:6379
  jdbcUrl: jdbc:postgresql://barbu-postgres-rw:5432/barbu
  jdbcDriver: org.postgresql.Driver
  # Origin allowed to call the API from the browser (CORS). Must match the deployed web host.
  corsAllowedOrigins: https://barbu.kour0.com

# A SealedSecret (cluster-secrets/barbu-barbu-server-secrets) holds JDBC_USER, JDBC_PASSWORD, JWT_SECRET.
secretName: barbu-server-secrets

resources:
  requests:
    cpu: 100m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 768Mi

# Toleration du taint du nodepool autoscalé : autorise les pods serveur élastiques à atterrir sur les
# nœuds éphémères ajoutés par le cluster-autoscaler (le socle, lui, reste sur le worker fixe).
tolerations:
  - key: barbu.dev/elastic
    operator: Equal
    value: "true"
    effect: NoSchedule

metrics:
  serviceMonitor:
    enabled: true
    interval: 30s
    path: /prometheus

# KEDA drives replicas from the business metric (rooms per pod). ArgoCD ignores /spec/replicas so it
# does not fight the autoscaler.
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 8
  roomsPerPod: "10"
  prometheusServerAddress: http://kps-kube-prometheus-stack-prometheus.monitoring.svc:9090

# Micro-segmentation du namespace barbu (default-deny + allows explicites). linkerd=true ajoute les
# allows du mesh pour que le default-deny ne casse pas mTLS (Phase 2, Task 4).
networkPolicy:
  enabled: true
  ingressNamespace: traefik
  monitoringNamespace: monitoring
  postgresOperatorNamespace: cnpg-system
  linkerd: true
