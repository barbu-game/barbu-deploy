# Mono-réplique imposée : Uptime Kuma stocke tout dans une SQLite (/app/data),
# mono-writer, donc pas de scale-out. La stratégie Recreate évite deux pods sur
# le même volume RWO pendant un rollout.
image:
  repository: louislam/uptime-kuma
  tag: "2.4.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 3001

persistence:
  size: 2Gi
  storageClass: hcloud-volumes

resources:
  requests:
    cpu: 25m
    memory: 128Mi
  limits:
    memory: 256Mi
