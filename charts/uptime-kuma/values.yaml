# Single replica enforced: Uptime Kuma stores everything in a SQLite (/app/data),
# single-writer, so no scale-out. The Recreate strategy avoids two pods on
# the same RWO volume during a rollout.
image:
  repository: louislam/uptime-kuma
  tag: "2.4.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 3001

persistence:
  size: 2Gi
  storageClass: hcloud-volumes

resources:
  requests:
    cpu: 25m
    memory: 128Mi
  limits:
    memory: 256Mi
