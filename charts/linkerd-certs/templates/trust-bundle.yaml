# Publishes the trust anchor (root CA) into the ConfigMap `linkerd-identity-trust-roots`
# (key ca-bundle.crt) that Linkerd's proxies read when identity.externalCA=true.
apiVersion: trust.cert-manager.io/v1alpha1
kind: Bundle
metadata:
  name: linkerd-identity-trust-roots
spec:
  sources:
    - secret:
        name: linkerd-trust-anchor
        key: ca.crt
  target:
    configMap:
      key: ca-bundle.crt
    namespaceSelector:
      matchLabels:
        kubernetes.io/metadata.name: linkerd
