# cert-manager-managed TLS for Linkerd's admission webhooks (proxy-injector, sp-validator,
# policy-validator). Linkerd otherwise self-signs these via a Helm `lookup`, which ArgoCD's
# `helm template` can't run — it regenerates a mismatched cert on every sync, so the API server
# rejects the webhook ("tls: bad certificate") until an injector restart, leaving pods unmeshed.
# A dedicated long-lived CA keeps each serving cert and the injected caBundle in lockstep; the
# caBundle is wired onto the webhook configs by cert-manager's ca-injector (proxyInjector/
# profileValidator/policyValidator.injectCaFrom in the linkerd-control-plane values).
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: linkerd-webhook-ca
  namespace: linkerd
spec:
  isCA: true
  commonName: webhook.linkerd.cluster.local
  secretName: linkerd-webhook-ca
  duration: 87600h # 10 years — the webhook CA rarely rotates
  renewBefore: 8760h
  issuerRef:
    name: linkerd-selfsigned
    kind: Issuer
  privateKey:
    algorithm: ECDSA
    encoding: PKCS8
---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: linkerd-webhook-ca
  namespace: linkerd
spec:
  ca:
    secretName: linkerd-webhook-ca
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: linkerd-proxy-injector
  namespace: linkerd
spec:
  secretName: linkerd-proxy-injector-k8s-tls
  dnsNames:
    - linkerd-proxy-injector.linkerd.svc
  duration: 8760h
  renewBefore: 720h
  issuerRef:
    name: linkerd-webhook-ca
    kind: Issuer
  privateKey:
    algorithm: ECDSA
    encoding: PKCS8
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: linkerd-sp-validator
  namespace: linkerd
spec:
  secretName: linkerd-sp-validator-k8s-tls
  dnsNames:
    - linkerd-sp-validator.linkerd.svc
  duration: 8760h
  renewBefore: 720h
  issuerRef:
    name: linkerd-webhook-ca
    kind: Issuer
  privateKey:
    algorithm: ECDSA
    encoding: PKCS8
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: linkerd-policy-validator
  namespace: linkerd
spec:
  secretName: linkerd-policy-validator-k8s-tls
  dnsNames:
    - linkerd-policy-validator.linkerd.svc
  duration: 8760h
  renewBefore: 720h
  issuerRef:
    name: linkerd-webhook-ca
    kind: Issuer
  privateKey:
    algorithm: ECDSA
    encoding: PKCS8
