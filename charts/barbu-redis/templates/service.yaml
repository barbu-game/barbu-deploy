apiVersion: v1
kind: Service
metadata:
  name: barbu-redis
  labels:
    app: barbu-redis
  annotations:
    # Redis is unmeshed; meshed clients must treat 6379 as an opaque TCP stream rather than
    # attempt protocol detection or mTLS against it.
    config.linkerd.io/opaque-ports: "6379"
spec:
  type: ClusterIP
  selector:
    app: barbu-redis
  ports:
    - name: redis
      port: {{ .Values.service.port }}
      targetPort: redis
