apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Chart.Name }}
  labels:
    app: {{ .Chart.Name }}
data:
  # The layout's {{ "{{" }} … {{ "}}" }} belong to event-exporter (Go template + sprig), backtick-
  # escaped so Helm emits them literally; only .Values.* are Helm's. event-exporter templates only
  # string values (an int/bool becomes null), and Discord rejects a color sent as a string (400):
  # hence no `color`, severity carried by an emoji in the title.
  config.yaml: |
    logLevel: error
    logFormat: json
    route:
      routes:
        - match:
            - receiver: "discord"
              namespace: {{ .Values.target.namespace | quote }}
              kind: {{ .Values.target.kind | quote }}
    receivers:
      - name: "discord"
        webhook:
          # ${DISCORD_WEBHOOK_URL} is resolved at runtime from the secret (env),
          # so the URL never touches git.
          endpoint: "${DISCORD_WEBHOOK_URL}"
          headers:
            Content-Type: "application/json"
          layout:
            username: "Barbu · pods"
            embeds:
              - title: '{{ `{{ if eq .Type "Warning" }}⚠️{{ else }}🟢{{ end }} {{ .Reason }} · {{ .InvolvedObject.Name }}` }}'
                description: '{{ `{{ .Message }}` }}'
                footer:
                  text: '{{ `{{ .InvolvedObject.Kind }} · namespace {{ .InvolvedObject.Namespace }}` }}'
