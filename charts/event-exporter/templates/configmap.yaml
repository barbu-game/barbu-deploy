apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Chart.Name }}
  labels:
    app: {{ .Chart.Name }}
data:
  # Les {{ "{{" }} … {{ "}}" }} de la couche event-exporter (Go template + sprig) sont
  # émis littéralement via `…` pour ne pas être interprétés par Helm ; seuls
  # .Values.* relèvent de Helm. NB (tmpl.go) : seules les valeurs string sont
  # templatées — un int/bool dans le layout devient null —, et Discord refuse une
  # couleur en string (400). D'où l'absence de `color`, la sévérité passant par
  # un emoji dans le titre.
  config.yaml: |
    logLevel: error
    logFormat: json
    route:
      routes:
        - match:
            - receiver: "discord"
              namespace: {{ .Values.target.namespace | quote }}
              kind: {{ .Values.target.kind | quote }}
    receivers:
      - name: "discord"
        webhook:
          # ${DISCORD_WEBHOOK_URL} est résolu à l'exécution depuis le secret (env),
          # donc l'URL ne touche jamais git.
          endpoint: "${DISCORD_WEBHOOK_URL}"
          headers:
            Content-Type: "application/json"
          layout:
            username: "Barbu · pods"
            embeds:
              - title: '{{ `{{ if eq .Type "Warning" }}⚠️{{ else }}🟢{{ end }} {{ .Reason }} · {{ .InvolvedObject.Name }}` }}'
                description: '{{ `{{ .Message }}` }}'
                footer:
                  text: '{{ `{{ .InvolvedObject.Kind }} · namespace {{ .InvolvedObject.Namespace }}` }}'
