image:
  repository: ghcr.io/resmoio/kubernetes-event-exporter
  tag: "v1.7"
  pullPolicy: IfNotPresent

# Feed scope: we only route pod events from the barbu namespace.
target:
  namespace: barbu
  kind: Pod

# Sealed secret, key "url" = Discord webhook. Injected as env DISCORD_WEBHOOK_URL;
# the event-exporter substitutes ${...} in its config.
discordSecret: event-exporter-discord

resources:
  requests:
    cpu: 10m
    memory: 48Mi
  limits:
    memory: 96Mi
