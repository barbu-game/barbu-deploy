image:
  repository: ghcr.io/resmoio/kubernetes-event-exporter
  tag: "v1.7"
  pullPolicy: IfNotPresent

# Périmètre du feed : on ne route que les événements de pods du namespace barbu.
target:
  namespace: barbu
  kind: Pod

# Secret hors-git (cf. docs/secrets-runbook.md), clé "url" = webhook Discord.
# Injecté en env DISCORD_WEBHOOK_URL ; l'event-exporter substitue ${...} dans sa config.
discordSecret: event-exporter-discord

resources:
  requests:
    cpu: 10m
    memory: 48Mi
  limits:
    memory: 96Mi
