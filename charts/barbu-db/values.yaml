cluster:
  name: barbu-postgres
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:16
  storageSize: 5Gi
  storageClass: hcloud-volumes
  database: barbu
  owner: barbu
  # Secret (kubernetes.io/basic-auth) with username/password for the app role.
  appSecret: barbu-db-app
  # Secret (key: password) whose value CNPG sets as the grafana_ro role password.
  roSecret: grafana-pg-ro

# CNPG backup to S3 (base backup + continuous WAL / PITR) — fully wired and
# production-ready. Disabled on purpose: Hetzner Object Storage bills a ~6 €/mo
# flat minimum regardless of usage, which is disproportionate for a sub-100 MB
# database whose live state lives in Redis. Flip `enabled: true` (and provision
# the barbu-backups bucket + barbu-backup-s3 secret) to turn it on unchanged.
backup:
  enabled: false
  schedule: "0 0 3 * * *"        # 03:00 UTC daily (6-field CNPG cron)
  retentionPolicy: "30d"
  destinationPath: s3://barbu-backups/barbu
  endpointURL: https://nbg1.your-objectstorage.com
  s3Secret: barbu-backup-s3      # keys: ACCESS_KEY_ID, ACCESS_SECRET_KEY
