apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: {{ .Values.cluster.name }}
spec:
  instances: {{ .Values.cluster.instances }}
  imageName: {{ .Values.cluster.imageName }}
  # Propagated to CNPG-managed Services and Pods (metadata only, no rollout). opaque-ports lets a
  # meshed client (barbu-server) treat barbu-postgres-rw:5432 as an opaque TCP stream instead of
  # running Linkerd protocol detection on it; inject: disabled keeps Postgres itself out of the mesh
  # so a restart under namespace-wide injection can't give it a sidecar.
  inheritedMetadata:
    annotations:
      config.linkerd.io/opaque-ports: "5432"
      linkerd.io/inject: disabled
  storage:
    size: {{ .Values.cluster.storageSize }}
    storageClass: {{ .Values.cluster.storageClass }}
  bootstrap:
    initdb:
      database: {{ .Values.cluster.database }}
      owner: {{ .Values.cluster.owner }}
      secret:
        name: {{ .Values.cluster.appSecret }}
  # Grant the app owner CREATEROLE so the grafana-pg-ro PostSync job can create the
  # read-only role and its SELECT grants. passwordSecret reuses the secret CNPG
  # already holds for the owner, so reconciliation keeps the app credentials unchanged.
  managed:
    roles:
      - name: {{ .Values.cluster.owner }}
        ensure: present
        login: true
        createrole: true
        passwordSecret:
          name: {{ .Values.cluster.appSecret }}
      # CNPG (superuser) owns grafana_ro's password. PostgreSQL 16 hardened
      # CREATEROLE: a non-admin role can no longer ALTER another role's password,
      # so the app owner can't set it from the PostSync job — letting CNPG manage
      # it keeps the read-only login working across fresh installs and restores.
      - name: grafana_ro
        ensure: present
        login: true
        passwordSecret:
          name: {{ .Values.cluster.roSecret }}
  {{- if .Values.backup.enabled }}
  backup:
    retentionPolicy: {{ .Values.backup.retentionPolicy | quote }}
    barmanObjectStore:
      destinationPath: {{ .Values.backup.destinationPath }}
      endpointURL: {{ .Values.backup.endpointURL }}
      s3Credentials:
        accessKeyId:
          name: {{ .Values.backup.s3Secret }}
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: {{ .Values.backup.s3Secret }}
          key: ACCESS_SECRET_KEY
  {{- end }}
