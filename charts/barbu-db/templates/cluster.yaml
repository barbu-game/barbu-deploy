apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: {{ .Values.cluster.name }}
spec:
  instances: {{ .Values.cluster.instances }}
  imageName: {{ .Values.cluster.imageName }}
  # Propagated to CNPG-managed Services and Pods (metadata only, no rollout). opaque-ports makes
  # meshed clients treat 5432 as an opaque TCP stream (no Linkerd protocol detection); inject:
  # disabled keeps Postgres out of the mesh so a restart under namespace-wide injection can't
  # give it a sidecar.
  inheritedMetadata:
    annotations:
      config.linkerd.io/opaque-ports: "5432"
      linkerd.io/inject: disabled
  storage:
    size: {{ .Values.cluster.storageSize }}
    storageClass: {{ .Values.cluster.storageClass }}
  bootstrap:
    initdb:
      database: {{ .Values.cluster.database }}
      owner: {{ .Values.cluster.owner }}
      secret:
        name: {{ .Values.cluster.appSecret }}
  # App owner needs CREATEROLE so the PostSync grant job can create the read-only role and its
  # SELECT grants. passwordSecret reuses the owner's existing secret, so reconciliation leaves
  # the app credentials unchanged.
  managed:
    roles:
      - name: {{ .Values.cluster.owner }}
        ensure: present
        login: true
        createrole: true
        passwordSecret:
          name: {{ .Values.cluster.appSecret }}
      # CNPG (superuser) owns grafana_ro's password. PostgreSQL 16 hardened CREATEROLE so a
      # non-admin role can't ALTER another role's password; the app owner therefore can't set it
      # from the grant job, and letting CNPG manage it keeps the read-only login working across
      # fresh installs and restores.
      - name: grafana_ro
        ensure: present
        login: true
        passwordSecret:
          name: {{ .Values.cluster.roSecret }}
  {{- if .Values.backup.enabled }}
  backup:
    retentionPolicy: {{ .Values.backup.retentionPolicy | quote }}
    barmanObjectStore:
      destinationPath: {{ .Values.backup.destinationPath }}
      endpointURL: {{ .Values.backup.endpointURL }}
      s3Credentials:
        accessKeyId:
          name: {{ .Values.backup.s3Secret }}
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: {{ .Values.backup.s3Secret }}
          key: ACCESS_SECRET_KEY
  {{- end }}
