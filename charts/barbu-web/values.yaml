# Stateless client. 1 replica on the constrained worker; scalable later.
# NEXT_PUBLIC_WS_URL is baked into the image at build time.
replicaCount: 1

image:
  repository: ghcr.io/barbu-game/barbu-web
  tag: "0.2.1" # bumped by the release pipeline
  pullPolicy: IfNotPresent

imagePullSecret: ""

service:
  type: ClusterIP
  port: 3000

ingress:
  enabled: true
  className: traefik
  host: barbu.kour0.com
  certResolver: le

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

# Block ArgoCD sync until the Linkerd proxy-injector is ready, so pods are always meshed.
waitForInjector: true
