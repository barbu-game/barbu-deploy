# Stateless client — scales horizontally behind the ingress.
# NEXT_PUBLIC_WS_URL is baked into the image at build time (build arg).
replicaCount: 2

image:
  repository: ghcr.io/barbu-game/barbu-web
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 3000

ingress:
  enabled: true
  className: nginx
  host: barbu.example.com

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi
