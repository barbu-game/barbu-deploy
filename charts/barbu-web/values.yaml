# Stateless client. 1 replica on the constrained worker; scalable later.
# NEXT_PUBLIC_WS_URL is baked into the image at build time (see Plan 2).
replicaCount: 1

image:
  repository: ghcr.io/barbu-game/barbu-web
  # Web releases keep recomputing 0.1.0 (no git tags drive semantic-version), so the new
  # build is pinned by digest to force the pull — it carries NEXT_PUBLIC_API_URL + the new UI.
  tag: "0.1.0@sha256:fc4a9765c18f4da80c5fb54aa2dc6dbeec9aa526bd7efdf8d4da4367c920c61d"
  pullPolicy: IfNotPresent

imagePullSecret: ghcr-pull

service:
  type: ClusterIP
  port: 3000

ingress:
  enabled: true
  className: traefik
  host: barbu.kour0.com
  certResolver: le

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi
