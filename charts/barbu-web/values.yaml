# Stateless client. 1 replica on the constrained worker; scalable later.
# NEXT_PUBLIC_WS_URL is baked into the image at build time (see Plan 2).
replicaCount: 1

image:
  repository: ghcr.io/barbu-game/barbu-web
  tag: "0.1.0@sha256:829d91b71322d3b18069b39fdb222496bb7f123d51f89dca127025f053ce652e" # last manual digest pin; auto-bumped to a clean tag on the next release
  pullPolicy: IfNotPresent

imagePullSecret: ghcr-pull

service:
  type: ClusterIP
  port: 3000

ingress:
  enabled: true
  className: traefik
  host: barbu.kour0.com
  certResolver: le

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi
