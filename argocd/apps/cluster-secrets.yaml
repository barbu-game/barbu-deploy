apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cluster-secrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1" # before the workloads that consume these secrets
spec:
  project: default
  source:
    repoURL: ssh://git@ssh.github.com:443/barbu-game/barbu-deploy.git
    targetRevision: main
    path: charts/cluster-secrets
  destination:
    server: https://kubernetes.default.svc
    # Each SealedSecret carries its own namespace (barbu / monitoring);
    # this destination is only the fallback for any resources without a namespace.
    namespace: barbu
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
