apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cluster-secrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1" # avant les workloads qui consomment ces secrets
spec:
  project: default
  source:
    repoURL: ssh://git@ssh.github.com:443/barbu-game/barbu-deploy.git
    targetRevision: main
    path: charts/cluster-secrets
  destination:
    server: https://kubernetes.default.svc
    # Chaque SealedSecret porte son propre namespace (barbu / monitoring) ;
    # cette destination n'est que le fallback pour d'éventuelles ressources sans namespace.
    namespace: barbu
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
