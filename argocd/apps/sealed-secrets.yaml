apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sealed-secrets
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://bitnami.github.io/sealed-secrets
    chart: sealed-secrets
    targetRevision: 2.18.6
    helm:
      releaseName: sealed-secrets
      valuesObject:
        # By default kubeseal looks for a controller named "sealed-secrets-controller"
        # in kube-system; we align the name so `kubeseal` works without flags.
        fullnameOverride: sealed-secrets-controller
        resources:
          requests: { cpu: 10m, memory: 64Mi }
          limits: { memory: 128Mi }
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
