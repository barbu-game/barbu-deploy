apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: linkerd-control-plane
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2" # after linkerd-certs (issuer secret + trust-roots ConfigMap)
spec:
  project: default
  source:
    repoURL: https://helm.linkerd.io/edge
    chart: linkerd-control-plane
    targetRevision: 2026.6.3
    helm:
      releaseName: linkerd-control-plane
      valuesObject:
        # externalCA tells Linkerd the trust roots come from trust-manager (rotated by cert-manager);
        # the issuer is read from the kubernetes.io/tls secret.
        identity:
          externalCA: true
          issuer:
            scheme: kubernetes.io/tls
        # Webhook TLS is issued by cert-manager, not self-signed by Linkerd, otherwise ArgoCD's
        # `helm template` regenerates a mismatched cert each sync. externalSecret tells Linkerd the
        # *-k8s-tls secrets already exist; injectCaFrom keeps each webhook's caBundle matched to its serving cert.
        proxyInjector:
          externalSecret: true
          injectCaFrom: linkerd/linkerd-proxy-injector
        profileValidator:
          externalSecret: true
          injectCaFrom: linkerd/linkerd-sp-validator
        policyValidator:
          externalSecret: true
          injectCaFrom: linkerd/linkerd-policy-validator
  destination:
    server: https://kubernetes.default.svc
    namespace: linkerd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
