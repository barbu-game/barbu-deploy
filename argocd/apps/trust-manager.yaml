apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: trust-manager
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0" # after cert-manager (its webhook is cert-manager-signed)
spec:
  project: default
  source:
    repoURL: https://charts.jetstack.io
    chart: trust-manager
    targetRevision: v0.12.0
    helm:
      releaseName: trust-manager
      valuesObject:
        # trust-manager watches this namespace for its source secrets.
        app:
          trust:
            namespace: linkerd
        resources:
          requests: { cpu: 10m, memory: 32Mi }
          limits: { memory: 64Mi }
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
