apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: barbu-server
  namespace: argocd
  annotations:
    # After linkerd-control-plane (wave 2): the proxy-injector must be healthy before these pods are
    # created, otherwise they start unmeshed (the injector webhook fails open) and need a restart.
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: default
  source:
    repoURL: ssh://git@ssh.github.com:443/barbu-game/barbu-deploy.git
    targetRevision: main
    path: charts/barbu-server
  destination:
    server: https://kubernetes.default.svc
    namespace: barbu
  # KEDA owns the replica count; don't let ArgoCD revert the autoscaler on every sync.
  ignoreDifferences:
    - group: apps
      kind: StatefulSet
      name: barbu-server
      jsonPointers:
        - /spec/replicas
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    # Mesh the whole barbu namespace: pods get the Linkerd sidecar (mTLS pod-to-pod).
    managedNamespaceMetadata:
      annotations:
        linkerd.io/inject: enabled
