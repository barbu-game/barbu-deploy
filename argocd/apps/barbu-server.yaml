apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: barbu-server
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/barbu-game/barbu-deploy.git
    targetRevision: main
    path: charts/barbu-server
  destination:
    server: https://kubernetes.default.svc
    namespace: barbu
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
