apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 65.5.1
    helm:
      releaseName: kps
      valuesObject:
        # Tight footprint for the 8 GB worker.
        prometheus:
          prometheusSpec:
            retention: 15d
            resources:
              requests: { cpu: 100m, memory: 700Mi }
              limits: { memory: 1200Mi }
            storageSpec:
              volumeClaimTemplate:
                spec:
                  storageClassName: hcloud-volumes
                  accessModes: ["ReadWriteOnce"]
                  resources: { requests: { storage: 10Gi } }
            # Discover ServiceMonitors/rules in any namespace (incl. barbu).
            serviceMonitorSelectorNilUsesHelmValues: false
            ruleSelectorNilUsesHelmValues: false
        alertmanager:
          alertmanagerSpec:
            resources:
              requests: { cpu: 10m, memory: 64Mi }
              limits: { memory: 128Mi }
            # Operator v0.77 can't validate discord webhook_url_file in a raw config, so
            # routing lives in an AlertmanagerConfig CR with the webhook URL as a secret keyref.
            alertmanagerConfiguration:
              name: barbu-discord
        grafana:
          adminPassword: ""
          admin:
            existingSecret: grafana-admin
            userKey: admin-user
            passwordKey: admin-password
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits: { memory: 256Mi }
          # Grafana is served through the Cloudflare Tunnel and guarded by Cloudflare Access, not public ingress.
          ingress:
            enabled: false
          sidecar:
            dashboards:
              enabled: true
              label: grafana_dashboard
              searchNamespace: ALL
          additionalDataSources:
            - name: BarbuPostgres
              type: postgres
              access: proxy
              url: barbu-postgres-rw.barbu.svc:5432
              database: barbu
              user: grafana_ro
              jsonData:
                sslmode: disable
                postgresVersion: 1600
              secureJsonData:
                password: ${GRAFANA_PG_RO_PASSWORD}
          envFromSecret: grafana-pg-ro
        defaultRules:
          create: true
        kubeEtcd: { enabled: false }
        kubeControllerManager: { enabled: false }
        kubeScheduler: { enabled: false }
        # k3s bundles kube-proxy and only exposes its metrics on 127.0.0.1:10249,
        # so it is unscrapable: the target disappears and fires KubeProxyDown in a loop.
        kubeProxy: { enabled: false }
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
