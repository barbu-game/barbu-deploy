apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: barbu-web
  namespace: argocd
  annotations:
    # After linkerd-control-plane (wave 2): the proxy-injector must be healthy before these pods are
    # created, otherwise they start unmeshed (the injector webhook fails open) and need a restart.
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: default
  source:
    repoURL: ssh://git@ssh.github.com:443/barbu-game/barbu-deploy.git
    targetRevision: main
    path: charts/barbu-web
  destination:
    server: https://kubernetes.default.svc
    namespace: barbu
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
